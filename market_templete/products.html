
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f4f4;
color:#333;
}

header{
background:#111;
color:white;
padding:15px 40px;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
}

.container{
width:1100px;
margin:auto;
padding:40px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:6px;
overflow:hidden;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
font-weight:bold;
margin-top:5px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:8px 14px;
background:#111;
color:white;
text-decoration:none;
font-size:13px;
border-radius:3px;
}

.hero{
background:white;
padding:60px;
text-align:center;
border-bottom:1px solid #ddd;
}

.product-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
background:white;
padding:40px;
border:1px solid #ddd;
}

.product-layout img{
width:100%;
}

.table{
width:100%;
border-collapse:collapse;
background:white;
}

.table th,.table td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:left;
}

.form-box{
width:400px;
background:white;
padding:30px;
border:1px solid #ddd;
margin:auto;
}

.form-box input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
}

.footer{
margin-top:60px;
background:#111;
color:#aaa;
text-align:center;
padding:30px;
font-size:13px;
}
</style>
</head>
