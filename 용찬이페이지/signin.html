<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Latest compiled JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .logform{
            margin-top: 10%;
            margin-left: 20%;
            padding-top: 20px;
            padding-left: 50px;
            width: 500px;
            height: 500px;
            border: 1px solid rgb(252, 67, 236);
            background-color: rgb(253, 233, 252);
        }
    </style>
</head>
<body>
    <b style="font-size: 70px;
              color: deeppink;
              margin-left: 30%;"
            >
        꿀꿀 하우스</b>
    <ul class="nav nav-pills nav-justified">
        <li class="nav-item">
            <a class="nav-link">게시판</a>
        </li>
        <li class="nav-item">
            <a class="nav-link">갤러리</a>
        </li>
        <li class="nav-item">
            <a class="nav-link">뉴스</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active">로그인</a>
        </li>
    </ul>

    <div class="logform">
    <form>
        <table>
            <tr>
                <td>이름 : </td>
                <td><input type="text"
                name="name"></td>
            </tr>
            <tr>
                <td>닉네임 : </td>
                <td><input type="text"
                name="nick"></td>
            </tr>
            <tr>
                <td>아이디 : </td>
                <td>
                    <input type="text"
                            name="id">
                    <input type="button"
                            name="same"
                            value="중복확인">
                </td>
            </tr>
            <tr>
                <td>비밀번호 : </td>
                <td><input type="password"
                            name="pw"
                            placeholder="대소문자+특수문자">
                </td>
            <tr>
                <td>성별</td>
                <td><input type="radio"
                            name="gender"
                            value="남자">남자
                    <input type="radio"
                            name="gender"
                            value="여자">여자
                </td>
            </tr>
            <tr>
                <td>사는 지역 : </td>
                <td>
                    <select name="address">
                        <option>==선택하세요==</option>
                        <option value="서울">서울</option>
                        <option value="경기">경기</option>
                        <option value="인천">인천</option>
                        <option value="대전">대전</option>
                        <option value="강원">강원</option>
                        <option value="충청">충청</option>
                        <option value="대구">대구</option>
                        <option value="광주">광주</option>
                        <option value="부산">부산</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>선호하는 음식 : </td>
                <td><select name="favfood">
                        <option>==선택하세요==</option>
                        <option value="한식">한식</option>
                        <option value="일식">일식</option>
                        <option value="중식">중식</option>
                        <option value="양식">양식</option>
                        <option value="간식">간식</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>알게 된 경로</td>
                <td><input type="radio"
                            name="how"
                            value="인터넷">인터넷
                    <input type="radio"
                            name="how"
                            value="블로그">블로그
                    <input type="radio"
                            name="how"
                            value="지인소개">지인소개
                    <br>
                    <input type="radio"
                            name="how"
                            value="광고">광고
                    <input type="radio"
                            name="how"
                            value="유튜브">유튜브
                </td>
            </tr>
            <tr>
                <td>하고 싶은 말</td>
                <td colspan="2">
                    <textarea name="memo"
                                cols="30"
                                rows="4"></textarea>
                </td>
            </tr>
        </table>

        <a href="">
        <input type="button" 
               value="회원가입"
               class="btn btn-primary">
        </a>
        <a href="\용찬이페이지\home.html">
        <input type="button" 
            value="취소"
            class="btn btn-danger">
        </a>
    </form>
</div>
</body>
</html>
